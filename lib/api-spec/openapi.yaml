openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Fitness Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: workouts
  - name: exercises
  - name: sets
  - name: templates
  - name: progress
  - name: records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List all workouts ordered by date desc
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workout"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Create a new workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutInput"
      responses:
        "201":
          description: Created workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"

  /workouts/{id}:
    get:
      operationId: getWorkout
      tags: [workouts]
      summary: Get a workout with its exercises and logged sets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workout with exercises and sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutDetail"
        "404":
          description: Not found
    patch:
      operationId: updateWorkout
      tags: [workouts]
      summary: Update a workout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutUpdate"
      responses:
        "200":
          description: Updated workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a workout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts/{id}/exercises:
    post:
      operationId: addExercise
      tags: [exercises]
      summary: Add an exercise to a workout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseInput"
      responses:
        "201":
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"

  /workouts/{id}/exercises/{exerciseId}:
    delete:
      operationId: deleteExercise
      tags: [exercises]
      summary: Delete an exercise and its sets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts/{id}/exercises/{exerciseId}/sets:
    post:
      operationId: logSet
      tags: [sets]
      summary: Log a set for an exercise
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogSetInput"
      responses:
        "201":
          description: Logged set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"

  /workouts/{id}/exercises/{exerciseId}/sets/{setId}:
    delete:
      operationId: deleteSet
      tags: [sets]
      summary: Delete a logged set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
        - name: setId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /exercise-templates:
    get:
      operationId: listExerciseTemplates
      tags: [templates]
      summary: List all exercise templates with info and alternatives
      responses:
        "200":
          description: Templates grouped by split
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseTemplate"

  /progress:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get progress data for all exercises (max weight and volume over time)
      responses:
        "200":
          description: Progress per exercise
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExerciseProgressSummary"

  /personal-records:
    get:
      operationId: getPersonalRecords
      tags: [records]
      summary: All-time personal records per exercise
      responses:
        "200":
          description: Personal records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonalRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Workout:
      type: object
      required: [id, name, date, split, createdAt, totalSets]
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        split:
          type: string
          enum: [Push, Pull, Legs, Upper, Arms, Lower]
        notes:
          type: ["string", "null"]
        exerciseCount:
          type: integer
        totalSets:
          type: integer
        createdAt:
          type: string
          format: date-time

    WorkoutDetail:
      type: object
      required: [id, name, date, split, exercises, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        split:
          type: string
          enum: [Push, Pull, Legs, Upper, Arms, Lower]
        notes:
          type: ["string", "null"]
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/Exercise"
        createdAt:
          type: string
          format: date-time

    WorkoutInput:
      type: object
      required: [name, date, split]
      properties:
        name:
          type: string
          minLength: 1
        date:
          type: string
          format: date
        split:
          type: string
          enum: [Push, Pull, Legs, Upper, Arms, Lower]
        notes:
          type: ["string", "null"]

    WorkoutUpdate:
      type: object
      properties:
        name:
          type: string
        notes:
          type: ["string", "null"]

    Exercise:
      type: object
      required: [id, workoutId, name, muscleGroup, order, sets]
      properties:
        id:
          type: integer
        workoutId:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        order:
          type: integer
        notes:
          type: ["string", "null"]
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSet"

    ExerciseInput:
      type: object
      required: [name, muscleGroup]
      properties:
        name:
          type: string
          minLength: 1
        muscleGroup:
          type: string
        notes:
          type: ["string", "null"]

    WorkoutSet:
      type: object
      required: [id, exerciseId, setNumber, reps, completedAt]
      properties:
        id:
          type: integer
        exerciseId:
          type: integer
        setNumber:
          type: integer
        reps:
          type: integer
        weightKg:
          type: ["number", "null"]
        completedAt:
          type: string
          format: date-time

    LogSetInput:
      type: object
      required: [reps]
      properties:
        reps:
          type: integer
          minimum: 1
        weightKg:
          type: ["number", "null"]

    ExerciseTemplate:
      type: object
      required: [id, name, muscleGroup, split, musclesWorked, formTip, alternatives]
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        split:
          type: string
          enum: [Push, Pull, Legs, Upper, Arms, Lower]
        musclesWorked:
          type: string
        formTip:
          type: string
        alternatives:
          type: array
          items:
            type: string

    ExerciseProgressSummary:
      type: object
      required: [exerciseName, muscleGroup, dataPoints]
      properties:
        exerciseName:
          type: string
        muscleGroup:
          type: string
        dataPoints:
          type: array
          items:
            $ref: "#/components/schemas/ProgressDataPoint"

    ProgressDataPoint:
      type: object
      required: [date, maxWeightKg, totalVolume, totalReps]
      properties:
        date:
          type: string
          format: date
        maxWeightKg:
          type: ["number", "null"]
        totalVolume:
          type: number
        totalReps:
          type: integer

    PersonalRecord:
      type: object
      required: [exerciseName, muscleGroup, maxWeightKg, maxReps, achievedDate, workoutName]
      properties:
        exerciseName:
          type: string
        muscleGroup:
          type: string
        maxWeightKg:
          type: ["number", "null"]
        maxReps:
          type: integer
        achievedDate:
          type: string
          format: date
        workoutName:
          type: string
